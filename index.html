<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            50: '#f8f9fa',
                            100: '#f1f3f4',
                            800: '#202124',
                            900: '#171717'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify to prevent XSS from Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* Markdown Styles */
        .markdown-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-content pre { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; font-family: monospace; font-size: 0.875rem; }
        .markdown-content code { background-color: rgba(148, 163, 184, 0.2); padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.875em; }
        .markdown-content pre code { background-color: transparent; padding: 0; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        
        /* Hide scrollbar for a cleaner look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white dark:bg-gemini-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <!-- Loading Fallback -->
    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-white dark:bg-gemini-900 z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mb-4"></div>
        <p class="text-gray-500 dark:text-gray-400 font-medium">Loading App...</p>
    </div>

    <!-- App Container -->
    <div class="flex min-h-screen w-full relative overflow-hidden">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 z-30 w-72 bg-gemini-50 dark:bg-gemini-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-4 flex items-center justify-between">
                <button id="newChatBtn" class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-700 hover:bg-gray-100 dark:hover:bg-gray-600 px-4 py-3 rounded-full shadow-sm transition-colors border border-gray-200 dark:border-gray-600">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="font-medium text-sm">New Chat</span>
                </button>
                <button id="closeSidebarBtn" class="md:hidden ml-2 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="px-4 py-2 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">History</div>
            <div class="flex-1 overflow-y-auto no-scrollbar px-2 space-y-1" id="chatHistoryList">
                <!-- History items injected here -->
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button id="clearChatBtn" class="w-full flex items-center gap-3 p-3 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear History
                </button>
                <button id="settingsBtn" class="w-full flex items-center gap-3 p-3 text-sm hover:bg-gray-200 dark:hover:bg-gray-700 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen w-full relative">
            <!-- Header -->
            <header class="h-16 flex items-center justify-between px-4 sticky top-0 bg-white/80 dark:bg-gemini-900/80 backdrop-blur-md z-10 border-b border-transparent dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <button id="openSidebarBtn" class="md:hidden p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-lg font-semibold tracking-wide bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">Universal AI</h1>
                </div>
                <button id="themeToggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <svg id="moonIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
            </header>

            <!-- Chat Area -->
            <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-6 pb-32 no-scrollbar scroll-smooth">
                <div id="chatMessages" class="max-w-3xl mx-auto flex flex-col gap-6">
                    <!-- Welcome Screen -->
                    <div id="welcomeScreen" class="flex flex-col items-center justify-center h-full mt-20 text-center">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-500 rounded-full flex items-center justify-center mb-6 shadow-lg">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                        </div>
                        <h2 class="text-2xl md:text-3xl font-bold mb-2">How can I help you today?</h2>
                        <p class="text-gray-500 dark:text-gray-400 max-w-md">Enter your OpenRouter API key in settings and start a conversation.</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white dark:from-gemini-900 dark:via-gemini-900 to-transparent pt-6 pb-4 px-4 md:px-8">
                <div class="max-w-3xl mx-auto relative flex items-end gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-2xl shadow-lg p-2 focus-within:ring-2 focus-within:ring-blue-500/50 transition-shadow">
                    <textarea id="messageInput" rows="1" class="w-full max-h-32 bg-transparent resize-none outline-none py-3 px-4 text-sm md:text-base scroll-smooth text-gray-900 dark:text-gray-100" placeholder="Type a message..."></textarea>
                    <button id="sendBtn" class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0 mb-1 mr-1">
                        <svg class="w-5 h-5 translate-x-px -translate-y-px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
                <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center px-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-gemini-800 w-full max-w-md rounded-2xl shadow-2xl p-6 transform transition-all">
            <h3 class="text-xl font-bold mb-4">Settings</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:text-white">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model ID</label>
                    <input type="text" id="modelInput" value="deepseek/deepseek-r1:free" class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:text-white">
                    <p class="text-xs text-gray-500 mt-1">Default: deepseek/deepseek-r1:free</p>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3">
                <button id="cancelSettingsBtn" class="px-4 py-2 rounded-lg font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
                <button id="saveSettingsBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors shadow-sm">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State
            let state = {
                messages: [],
                apiKey: localStorage.getItem('ai_apiKey') || '',
                model: localStorage.getItem('ai_model') || 'deepseek/deepseek-r1:free',
                isDarkMode: localStorage.getItem('ai_theme') === 'dark'
            };

            // DOM Elements
            const DOM = {
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebarOverlay'),
                openSidebarBtn: document.getElementById('openSidebarBtn'),
                closeSidebarBtn: document.getElementById('closeSidebarBtn'),
                themeToggle: document.getElementById('themeToggle'),
                sunIcon: document.getElementById('sunIcon'),
                moonIcon: document.getElementById('moonIcon'),
                chatMessages: document.getElementById('chatMessages'),
                welcomeScreen: document.getElementById('welcomeScreen'),
                chatContainer: document.getElementById('chatContainer'),
                messageInput: document.getElementById('messageInput'),
                sendBtn: document.getElementById('sendBtn'),
                settingsBtn: document.getElementById('settingsBtn'),
                settingsModal: document.getElementById('settingsModal'),
                apiKeyInput: document.getElementById('apiKeyInput'),
                modelInput: document.getElementById('modelInput'),
                saveSettingsBtn: document.getElementById('saveSettingsBtn'),
                cancelSettingsBtn: document.getElementById('cancelSettingsBtn'),
                newChatBtn: document.getElementById('newChatBtn'),
                clearChatBtn: document.getElementById('clearChatBtn')
            };

            // Initialization
            function init() {
                loadHistory();
                applyTheme();
                renderMessages();
                
                // Hide loader
                setTimeout(() => {
                    DOM.loading.classList.add('hidden');
                }, 300); // Slight delay to ensure paint
            }

            // Theme Management
            function applyTheme() {
                if (state.isDarkMode) {
                    document.documentElement.classList.add('dark');
                    DOM.moonIcon.classList.add('hidden');
                    DOM.sunIcon.classList.remove('hidden');
                } else {
                    document.documentElement.classList.remove('dark');
                    DOM.sunIcon.classList.add('hidden');
                    DOM.moonIcon.classList.remove('hidden');
                }
            }

            DOM.themeToggle.addEventListener('click', () => {
                state.isDarkMode = !state.isDarkMode;
                localStorage.setItem('ai_theme', state.isDarkMode ? 'dark' : 'light');
                applyTheme();
            });

            // Mobile Sidebar Toggle
            function toggleSidebar() {
                const isClosed = DOM.sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    DOM.sidebar.classList.remove('-translate-x-full');
                    DOM.sidebarOverlay.classList.remove('hidden');
                } else {
                    DOM.sidebar.classList.add('-translate-x-full');
                    DOM.sidebarOverlay.classList.add('hidden');
                }
            }

            DOM.openSidebarBtn.addEventListener('click', toggleSidebar);
            DOM.closeSidebarBtn.addEventListener('click', toggleSidebar);
            DOM.sidebarOverlay.addEventListener('click', toggleSidebar);

            // Textarea Auto-resize
            DOM.messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                if(this.value.trim() === '') {
                    this.style.height = 'auto';
                }
            });

            // Settings Modal
            DOM.settingsBtn.addEventListener('click', () => {
                DOM.apiKeyInput.value = state.apiKey;
                DOM.modelInput.value = state.model;
                DOM.settingsModal.classList.remove('hidden');
            });

            DOM.cancelSettingsBtn.addEventListener('click', () => {
                DOM.settingsModal.classList.add('hidden');
            });

            DOM.saveSettingsBtn.addEventListener('click', () => {
                state.apiKey = DOM.apiKeyInput.value.trim();
                state.model = DOM.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
                localStorage.setItem('ai_apiKey', state.apiKey);
                localStorage.setItem('ai_model', state.model);
                DOM.settingsModal.classList.add('hidden');
            });

            // Chat Logic
            function loadHistory() {
                const saved = localStorage.getItem('ai_chatHistory');
                if (saved) {
                    try {
                        state.messages = JSON.parse(saved);
                    } catch (e) {
                        state.messages = [];
                    }
                }
            }

            function saveHistory() {
                localStorage.setItem('ai_chatHistory', JSON.stringify(state.messages));
            }

            DOM.newChatBtn.addEventListener('click', () => {
                state.messages = [];
                saveHistory();
                renderMessages();
                if(window.innerWidth < 768) toggleSidebar();
            });

            DOM.clearChatBtn.addEventListener('click', () => {
                if(confirm('Are you sure you want to clear all history?')) {
                    state.messages = [];
                    saveHistory();
                    renderMessages();
                }
            });

            function renderMessages() {
                // Clear existing (except welcome screen)
                const messageElements = DOM.chatMessages.querySelectorAll('.chat-bubble');
                messageElements.forEach(el => el.remove());

                if (state.messages.length === 0) {
                    DOM.welcomeScreen.classList.remove('hidden');
                    return;
                }

                DOM.welcomeScreen.classList.add('hidden');

                state.messages.forEach(msg => {
                    if (msg.role === 'system') return; // Skip system prompts
                    appendMessageUI(msg.role, msg.content);
                });

                scrollToBottom();
            }

            function appendMessageUI(role, content) {
                const div = document.createElement('div');
                div.className = `chat-bubble flex w-full ${role === 'user' ? 'justify-end' : 'justify-start'} animate-[fadeIn_0.3s_ease-out]`;
                
                const inner = document.createElement('div');
                
                if (role === 'user') {
                    inner.className = 'bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 px-5 py-3.5 rounded-2xl rounded-tr-sm max-w-[85%] text-[15px] shadow-sm';
                    inner.textContent = content;
                } else {
                    inner.className = 'markdown-content w-full md:max-w-[85%] text-gray-
